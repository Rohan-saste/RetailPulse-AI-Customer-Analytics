services:
  - type: web
    name: retailpulse-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DATA_MODE
        value: csv
    healthCheckPath: /api/v1/health
